<!-- html 문서선언 -->
<!doctype html>
<!-- 한국어페이지선언 -->
<html lang="ko">
  <!-- 준비 -->
  <head>
    <!-- 한글 안깨지게 -->
    <meta charset="UTF-8" />
    <!-- 탭에뜨는이름 -->
    <title>줄바꿈과 가로선</title>
  </head>
  <!-- 화면에 보이는 진짜 내용 칸 -->
  <body>
    <!-- br = 한 문단 안에서 줄 바꾸기 (닫는 태그 없는 빈 요소) -->
    <p>첫째줄<br />둘째줄</p>
    <!-- hr = 내용을 나누는 가로 줄 (닫는 태그 없는 빈 요소) -->
    <hr />
    <p>셋째줄<br />넷째줄</p>
  </body>
</html>
<!-- <br> = 한 문단 안에서 줄 바꾸기, <hr> = 내용을 나누는 가로 줄 — 둘 다 닫는 태그 없는 빈 요소 -->
