<!-- html 문서선언 -->
<!doctype html>
<!-- 한국어 페이지 선언 -->
<html lang="ko">
  <!-- 화면엔 안 보이는 준비 칸 -->
  <head>
    <!-- 한글 안 깨지게 -->
    <meta charset="UTF-8" />
    <!-- 브라우저 탭에 뜨는 이름 -->
    <title>div 상자</title>
  </head>
  <!-- 화면에 보이는 진짜 내용 칸 -->
  <body>
    <!-- div = 사진·이름·가격을 한 덩어리(상품 카드)로 묶기 -->
    <div class="card">
      <img
        src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQt8t8VeDQ8xlJV9Q6JGVwANoZ6bUezmkKQgmbRNvahuw&s=10"
        alt="detox"
      />
      <h3>DETOX</h3>
      <a target="_blank" href="https://namu.wiki/w/DETOX">자세히 알아보기</a>
    </div>
    <div class="card">
      <!-- 사진 -->

      <img src="../image.png" alt="신발" />
      <!-- 이름 -->
      <h3>된장포스</h3>
      <!-- 가격 -->
      <p>59,000원</p>
      <a
        target="_blank"
        href="https://www.nike.com/kr/t/%EC%97%90%EC%96%B4-%ED%8F%AC%EC%8A%A4-1-%EB%A1%9C%EC%9A%B0-%EB%A0%88%ED%8A%B8%EB%A1%9C-%ED%94%84%EB%A6%AC%EB%AF%B8%EC%97%84-%EB%82%A8%EC%84%B1-%EC%8B%A0%EB%B0%9C-WEJzcGoe/IM5755-700"
        >구매하러가기</a
      >
    </div>
  </body>
</html>
<!-- <div class="card"> = 사진·이름·가격 3개를 한 상자로 묶음 — 나중에 CSS로 card에 테두리·그림자를 한 번 주면 3개가 통째로 카드 모양이 됨 -->
