<!-- html 문서선언 -->
<!doctype html>
<!-- 한국어페이지선언 -->1
<html lang="ko">
  <!-- 준비 -->
  <head>
    <!-- 한글 안깨지게 -->
    <meta charset="UTF-8" />
    <!-- 탭에뜨는이름 -->
    <title>제목과 문단</title>
  </head>
  <!-- 화면에 보이는 내용 -->
  <body>
    <!-- 제목은 h1-6까지 숫자가 클수록 작아짐 -->
    <h1>h1</h1>
    <h2>h2</h2>
    <h3>h3</h3>
    <h4>h4</h4>
    <h5>h5</h5>
    <h6>h6</h6>
    <!-- p => 문단(글 한 덩어리) -->
    <p>이것은 내용입니다.</p>
    <p>저는 HTML을 배우는 사람입니다.</p>
    <p><strong>이것은</strong><br />무엇일까요?</p>
    <!-- <p>이것은 안보입니다.</p> -->
    <img src="https://picsum.photos/300/200" alt="예시 사진" />
  </body>
</html>
<!-- 요소(element) = 여는태그 + 내용 +닫는태그
                    태그는 대소문자 안가림 -->
<!-- h1은 헤드라인 p는 본문 -->
