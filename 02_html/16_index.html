<!-- html 문서선언 -->
<!doctype html>
<!-- 한국어 페이지 선언 -->
<html lang="ko">
  <!-- 화면엔 안 보이는 준비 칸 -->
  <head>
    <!-- 한글 안 깨지게 -->
    <meta charset="UTF-8" />
    <!-- 브라우저 탭에 뜨는 이름 -->
    <title>영상넣기</title>
  </head>
  <!-- 화면에 보이는 진짜 내용 칸 -->
  <body>
    <h1>유튜브 영상 가져오기</h1>
    <iframe
      width="943"
      height="539"
      src="https://www.youtube.com/embed/aqz-KE-bpKQ"
      title="Big Buck Bunny 60fps 4K - Official Blender Foundation Short Film"
      frameborder="0"
      allow="
        accelerometer;
        autoplay;
        clipboard-write;
        encrypted-media;
        gyroscope;
        picture-in-picture;
        web-share;
      "
      referrerpolicy="strict-origin-when-cross-origin"
      allowfullscreen
    ></iframe>
  </body>
</html>
