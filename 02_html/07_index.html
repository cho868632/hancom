<!-- html 문서선언 -->
<!doctype html>
<!-- 한국어페이지선언 -->1
<html lang="ko">
  <!-- 준비 -->
  <head>
    <!-- 한글 안깨지게 -->
    <meta charset="UTF-8" />
    <!-- 탭에뜨는이름 -->
    <title>제목과 문단</title>
  </head>
  <!-- 화면에 보이는 내용 -->
  <body>
    <!-- 태그안에 태그 넣기 (중첩)-->
    <!-- 강조만 굵게 -->
    <p>저는<strong>강조</strong>입니다.&lt;&gt;&amp;</p>
    <!-- <p>이것은 안보입니다.</p> -->
    <img src="https://picsum.photos/300/200" alt="예시 사진" />
  </body>
</html>
<!-- 요소(element) = 여는태그 + 내용 +닫는태그
                    태그는 대소문자 안가림 -->
<!-- h1은 헤드라인 p는 본문 -->
