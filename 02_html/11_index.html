<!-- html 문서선언 -->
<!doctype html>
<!-- 한국어페이지선언 -->
<html lang="ko">
  <!-- 준비 -->
  <head>
    <!-- 한글 안깨지게 -->
    <meta charset="UTF-8" />
    <!-- 탭에뜨는이름 -->
    <title>자기소개</title>
  </head>
  <!-- 화면에 보이는 내용 -->
  <body>
    <!-- 시멘틱 테그 = 어느 부분인지 뜻이 담긴 이름표 -->
    <!-- 페이지 맨 위 구역 -->
    <header><h1>개발자 안치호</h1></header>
    <main>
      <img src="https://picsum.photos/300/200" alt="더미사진" />
      <p>안녕하세요 기본부터 배우는 중인 <strong>안치호</strong> 입니다.</p>
      <br />
      <p>
        리액트와 AI사용으로 공부한지 굉장히 오래된 것을 다시 배우고 있습니다.
      </p>
      <br />
      <p>화이팅 입니다.</p>
      <!-- ul = 점잇는 목록상자, li = 목록 한 줄 -->
      <ul>
        <!-- 목록 항목1 -->
        <li><strong>좋아하는것</strong> : 야구</li>
        <!-- 목록 항목2 -->
        <li><strong>취미</strong> : 스포츠관람</li>
        <!-- 목록 항목3 -->
        <li><strong>목표</strong> : 기본 개념을 이해하는 개발지</li>
      </ul>
    </main>
    <!-- 페이지 맨 아래 구역 -->
    <footer>
      <a target="_blank" href="https://github.com/Dante0214">깃허브 바로가기</a>
    </footer>
  </body>
</html>
<!-- 요소(element) = 여는태그 + 내용 + 닫는 태그
빈 요소 = <img/>,<meta/>
시멘틱 = <header></header>,<main></main>,<footer></footer>
속성 = 태그안에 들어가는 값(href) -->
