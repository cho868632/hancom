<!-- html 문서선언 -->
<!doctype html>
<!-- 한국어페이지선언 -->
<html lang="ko">
  <!-- 준비 -->
  <head>
    <!-- 한글 안깨지게 -->
    <meta charset="UTF-8" />
    <!-- 탭에뜨는이름 -->
    <title>태그 + 뼈대</title>
  </head>
  <!-- 화면에 보이는 내용 -->
  <body>
    <h1>안녕하세요</h1>
    <p>이것은 내용입니다.</p>
    <p><strong>이것은</strong><br />무엇일까요?</p>
    <!-- <p>이것은 안보입니다.</p> -->
    <img src="https://picsum.photos/300/200" alt="예시 사진" />
  </body>
</html>
<!-- 요소(element) = 여는태그 + 내용 +닫는태그
                    태그는 대소문자 안가림 -->
