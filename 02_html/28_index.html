<!-- html 문서선언 -->
<!doctype html>
<!-- 한국어 페이지 선언 -->
<html lang="ko">
  <!-- 화면엔 안 보이는 준비 칸 -->
  <head>
    <!-- 한글 안 깨지게 -->
    <meta charset="UTF-8" />
    <!-- 브라우저 탭에 뜨는 이름 -->
    <title>시멘틱 구조</title>
  </head>
  <!-- 화면에 보이는 진짜 내용 칸 -->
  <body>
    <!-- 맨 위 머리말 -->
    <header>
      <!-- 메뉴 모음 -->
      <nav>홈 · 소개 · 연락처</nav>
    </header>
    <!-- 핵심 본문 -->
    <main>
      <!-- 한 주제 덩어리 -->
      <section>
        <!-- 완결된 글 하나 -->
        <article>첫 번째 글 내용</article>
      </section>
    </main>
    <!-- 본문 옆 보조 내용 -->
    <aside>곁다리 정보(사이드바)</aside>
    <!-- 맨 아래 꼬리말 -->
    <footer>ⓒ 2026 내 사이트</footer>
  </body>
</html>
<!-- 똑같이 칸을 나눠도 <div>는 뜻이 없는 빈 상자 — 시맨틱 태그는 이름만 봐도 무슨 구역인지 드러남 (STEP 10 header·main·footer 보강)

네 가지 핵심 구역

• <nav> = 메뉴·길 안내 모음
• <section> = 한 주제로 묶인 덩어리
• <article> = 그 자체로 완결된 글(글·뉴스·카드)
• <aside> = 본문 곁다리(사이드바·광고) -->
