<!-- html 문서선언 -->
<!doctype html>
<!-- 한국어 페이지 선언 -->
<html lang="ko">
  <!-- 화면엔 안 보이는 준비 칸 -->
  <head>
    <!-- 한글 안 깨지게 -->
    <meta charset="UTF-8" />
    <!-- 브라우저 탭에 뜨는 이름 -->
    <title>표 칸 합치기</title>
  </head>
  <!-- 화면에 보이는 진짜 내용 칸 -->
  <body>
    <h1>표 합치기</h1>
    <!-- 표 전체 상자 (border=칸 선) -->
    <table border="1">
      <!-- 표 머리(제목 줄) -->
      <thead>
        <tr>
          <!-- colspan=3 → 가로 3칸을 하나로 합침 -->

          <th colspan="3">성적표</th>
          <th>등급</th>
        </tr>
      </thead>
      <!-- 표 몸통(내용 줄) -->
      <tbody>
        <tr>
          <!-- rowspan=2 → '언어' 칸이 세로 3줄을 하나로 합침 -->

          <td rowspan="3">언어</td>
          <td>국어</td>
          <td>90</td>
          <td>1</td>
        </tr>
        <tr>
          <!-- 위 rowspan 칸이 내려와 첫 칸을 채움 → 여기선 2칸만 적음 -->

          <td>영어</td>
          <td>85</td>
          <td>1</td>
        </tr>
        <tr>
          <!-- 위 rowspan 칸이 내려와 첫 칸을 채움 → 여기선 2칸만 적음 -->

          <td>스페인어</td>
          <td>35</td>
          <td>5</td>
        </tr>
      </tbody>
    </table>
  </body>
</html>
<!-- <thead> = 표 머리(제목 줄), <tbody> = 표 몸통(내용 줄) — 구역을 나눠 두면 표 뜻이 또렷 -->
