<!-- html 문서선언 -->
<!doctype html>
<!-- 한국어 페이지 선언 -->
<html lang="ko">
  <!-- 화면엔 안 보이는 준비 칸 -->
  <head>
    <!-- 한글 안 깨지게 -->
    <meta charset="UTF-8" />
    <!-- 브라우저 탭에 뜨는 이름 -->
    <title>글자 꾸미기</title>
  </head>
  <!-- 화면에 보이는 진짜 내용 칸 -->
  <body>
    <h1>글자 꾸미기</h1>
    <!-- em : 글자가 비스듬히 기울어짐 -->
    <p><em>기울임 강조</em></p>
    <!-- mark : 노란 형광펜으로 칠한 느낌 -->
    <p><mark>형광펜</mark></p>
    <!-- small : 글자를 작게 -->
    <p><small>작게 쓰는 글씨</small></p>
    <!-- code : 코드처럼 보이는 글씨 -->
    <p><code>print("hi")</code></p>
    <!-- blockquote : 남의 말을 인용하는 칸 -->
    <blockquote>인용 덩어리</blockquote>
    <!-- sub : 아래첨자 (작게 아래로) -->
    <p>H<sub>2</sub>O</p>
    <!-- sup : 위첨자 (작게 위로) -->
    <p>x<sup>2</sup></p>
  </body>
</html>
<!-- 
글자 꾸미기 태그
<em> 기울임 강조 · <mark> 형광펜 · <small> 작게
<code> 코드 글씨 · <blockquote> 인용 덩어리
<sub> 아래첨자(H<sub>2</sub>O) · <sup> 위첨자(x<sup>2</sup>) 
-->
