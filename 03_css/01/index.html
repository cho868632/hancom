<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>선택자</title>
    <link rel="stylesheet" href="styles/main.css" />
    <!-- ✨ 이 줄만 추가됨 — styles 폴더 main.css 연결 -->
  </head>
  <body>
    <!-- h1: 큰 제목 — main.css 규칙 → 빨강 -->
    <h1>CSS 첫걸음</h1>
    <!-- p: 문단 — 규칙 → 초록 -->
    <p>모든 p는 초록</p>
    <!-- class="special" 별명 → .special 규칙 → 주황 -->
    <p class="special">이 줄만 주황</p>
    <p class="special">이 줄도</p>
    <p class="special1">이 줄은 파랑</p>
    <!-- ul: 점(•) 목록 시작 -->
    <ul>
      <!-- li: 목록 한 칸 -->
      <li>사과</li>
      <!-- em: 강조(기울임) — li em 규칙 → 보라 -->
      <li><em>바나나</em>는 보라</li>
    </ul>
    <!-- 목록 끝 -->
  </body>
</html>
