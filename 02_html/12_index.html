<!-- html 문서선언 -->
<!doctype html>
<!-- 한국어페이지선언 -->
<html lang="ko">
  <!-- 준비 -->
  <head>
    <!-- 한글 안깨지게 -->
    <meta charset="UTF-8" />
    <!-- 탭에뜨는이름 -->
    <title>번호 목록</title>
  </head>
  <!-- 화면에 보이는 내용 -->
  <body>
    <!-- 시멘틱 테그 = 어느 부분인지 뜻이 담긴 이름표 -->
    <!-- 페이지 맨 위 구역 -->
    <header>맨 위 (로고, 제목)</header>
    <main>
      <!-- ol = 번호 매겨지는 목록상자, li = 목록 한 줄 -->
      <ol>
        <!-- 목록 항목1 -->
        <li>
          좋아하는것
          <ul>
            <li>집가기</li>
            <li>자기</li>
            <li>유튜브보기</li>
          </ul>
        </li>
        <!-- 목록 항목2 -->
        <li>취미</li>
        <!-- 목록 항목3 -->
        <li>목표</li>
        <!-- 목록 항목4 -->
        <li>목표</li>
        <!-- 목록 항목5 -->
        <li>목표</li>
      </ol>
    </main>
    <!-- 페이지 맨 아래 구역 -->
    <footer>맨아래 (저작권, 연락처)</footer>
  </body>
</html>
