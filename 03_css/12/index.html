<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>요소 위치 잡기 — position</title>
    <link rel="stylesheet" href="styles/main.css" />
  </head>
  <body>
    <h1>position</h1>
    <!-- 부모에 relative → 안쪽 absolute가 이 부모 기준 -->
    <div class="parent">
      <span class="ptag">부모 (relative)</span>
      <div class="rel">relative</div>
      <div class="abs">absolute</div>
    </div>
    <div class="fixed">fixed</div>
    <div class="sticky">sticky</div>
    <p>일반 글은 원래 흐름대로 흐름</p>
  </body>
</html>
<!--  z-index는 "같은 스태킹 컨텍스트 안에서 형제 관계인 요소들" 끼리만 비교된다. -->
