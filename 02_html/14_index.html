<!-- html 문서선언 -->
<!doctype html>
<!-- 한국어 페이지 선언 -->
<html lang="ko">
  <!-- 화면엔 안 보이는 준비 칸 -->
  <head>
    <!-- 한글 안 깨지게 -->
    <meta charset="UTF-8" />
    <!-- 브라우저 탭에 뜨는 이름 -->
    <title>시간표</title>
  </head>
  <body>
    <!-- 화면에 보이는 진짜 내용 칸 -->
    <!-- table = 표 전체 상자, border="1"은 칸 선을 보이게 함 -->
    <table border="1">
      <!-- tr=가로 한 줄, th=제목 칸(굵게 가운데) -->
      <tr>
        <th>요일</th>
        <th>과목</th>
      </tr>
      <tr>
        <!-- td=보통 내용 칸 -->
        <td>월</td>
        <td>국어</td>
      </tr>
      <tr>
        <td>화</td>
        <td>수학</td>
      </tr>
    </table>
    <table border="1">
      <caption>
        Front-end web developer course 2026
      </caption>
      <thead>
        <tr>
          <th scope="col">Person</th>
          <th scope="col">Mayjor</th>
          <th scope="col">Age</th>
        </tr>
      </thead>
      <tbody>
        <tr>
          <th scope="row">Chris</th>
          <td>electron</td>
          <td>22</td>
        </tr>
        <tr>
          <th scope="row">Dennis</th>
          <td>computerscience</td>
          <td>22</td>
        </tr>
        <tr>
          <th scope="row">Karen</th>
          <td>media</td>
          <td>22</td>
        </tr>
      </tbody>
    </table>
  </body>
</html>
