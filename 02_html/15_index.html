<!-- html 문서선언 -->
<!doctype html>
<!-- 한국어 페이지 선언 -->
<html lang="ko">
  <!-- 화면엔 안 보이는 준비 칸 -->
  <head>
    <!-- 한글 안 깨지게 -->
    <meta charset="UTF-8" />
    <!-- 브라우저 탭에 뜨는 이름 -->
    <title>입력 폼</title>
  </head>
  <!-- 화면에 보이는 진짜 내용 칸 -->
  <body>
    <!-- form = 입력칸들을 담는 묶음 상자 -->
    <form>
      <!-- label = 설명글자 / input type=text= 글자칸 / placeholder = 기본 값 -->
      <label>이름<input type="text" placeholder="이름입력" /></label>
      <!-- input type=number= 숫자칸 -->
      <label>나이 <input type="number" placeholder="나이입력" /></label>
      <br />
      <button type="submit">제출</button>

      <hr />
      <label>이름<input placeholder="이름입력" type="text" /></label
      ><label>학점<input placeholder="학점입력" type="text" /></label><br />
      <!-- 보내는 버튼 -->
      <button type="submit">제출</button>
      <hr />
    </form>
  </body>
</html>
