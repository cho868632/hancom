<!doctype html>
<!-- "이건 HTML 문서야" 선언 -->
<!-- 1. 이 한 줄 안 쓰면 화면이 어떻게 깨짐? -->
<html lang="ko">
  <!-- 문서 시작, 한국어 페이지 -->
  <!-- 2. lang="ko"를 "en"으로 바꾸면 뭐가 달라짐? -->
  <head>
    <!-- 화면엔 안 보이는 준비 칸 -->
    <meta charset="UTF-8" />
    <!-- 한글 안 깨지게 -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- 3. 이 viewport 줄은 무슨 일을 함? 모바일이랑 무슨 상관? -->
    <title>회원 가입</title>
    <!-- 브라우저 탭 이름 -->
  </head>
  <body>
    <!-- 화면에 보이는 진짜 칸 -->
    <header>
      <!-- 맨 위 머리말 -->
      <nav aria-label="주요 메뉴">
        <!-- 메뉴 모음 -->
        <!-- 4. aria-label은 왜 붙임? 없으면 누가 불편함? -->
        <ul>
          <li><a href="#join">가입</a></li>
          <!-- 5. href="#join" 앞의 #은 무슨 뜻? -->
        </ul>
      </nav>
    </header>

    <main>
      <!-- 핵심 본문 -->
      <section id="join">
        <!-- 한 주제 덩어리 -->
        <h2>회원 가입</h2>
        <form action="/signup" method="post">
          <!-- 6. action이랑 method가 각각 뭘 정하는 거임? -->
          <label for="email">이메일</label>
          <input type="email" id="email" name="email" required />
          <!-- 7. label의 for랑 input의 id가 똑같으면 무슨 일이 생김? -->
          <!-- 8. required 빼면 어떻게 됨? type="email"은 뭘 검사함? -->
          <fieldset>
            <legend>관심사</legend>
            <label
              ><input type="checkbox" name="tag" value="fe" /> 프론트엔드</label
            >
            <!-- 9. checkbox 여러 개의 name을 똑같이 "tag"로 두는 이유는? -->
          </fieldset>
          <button type="submit">가입하기</button>
        </form>
      </section>

      <section>
        <h2>요금제</h2>
        <table>
          <thead>
            <tr>
              <th>플랜</th>
              <th>가격</th>
            </tr>
          </thead>
          <!-- 10. thead와 tbody를 굳이 나누는 이유는? th랑 td 차이는? -->
          <tbody>
            <tr>
              <td>무료</td>
              <td>0원</td>
            </tr>
            <tr>
              <td>프로</td>
              <td>9,900원</td>
            </tr>
          </tbody>
        </table>
      </section>
    </main>

    <footer>
      <small>&copy; 2026 커뮤니티</small>
      <!-- 11. &copy; 는 화면에 뭐로 보임? 왜 ⓒ를 직접 안 침? -->
    </footer>
  </body>
</html>
<!-- 
왜 UTF-8이어야 하는가?

1. 웹 표준이자 국제 표준

- UTF-8은 웹의 사실상 표준입니다. 현대 모든 브라우저가 기본으로 지원하고, HTML 명세도 UTF-8을 권장합니다.
- UTF-16, UTF-32는 웹이 아닌 특수 용도(예: Windows 내부 문자 처리)에서만 씁니다.

2. 파일 크기 차이

┌────────┬───────────┬────────────┐
│ 인코딩 │ 한글 "가" │  영문 "a"  │
├────────┼───────────┼────────────┤
│ UTF-8  │ 3바이트   │ 1바이트 ✅ │
├────────┼───────────┼────────────┤
│ UTF-16 │ 2바이트   │ 2바이트    │
├────────┼───────────┼────────────┤
│ UTF-32 │ 4바이트   │ 4바이트    │
├────────┼───────────┼────────────┤
│ EUC-KR │ 2바이트   │ 1바이트    │
└────────┴───────────┴────────────┘

UTF-8이 효율적인 이유:
웹은 영문 콘텐츠가 많아서 UTF-8이 유리함

3. EUC-KR은 왜 안 쓰나?

❌ EUC-KR (Extended Unix Code - Korean)
- 한국어만 지원 (국가 종속)
- UTF-8이 나온 후 레거시 인코딩으로 취급됨
- 국제 사이트에서는 호환 안 됨

✅ UTF-8 (Universal)
- 전 세계 모든 언어 1개로 통합
- 한글 + 영어 + 일본어 + 이모지까지 모두 표현 가능

4. 브라우저 호환성

 과거: EUC-KR 사용 
<meta charset="euc-kr" />
↓ 문제점: UTF-8 기반 API들과 충돌, 국제화 어려움

 현재: UTF-8 필수 
<meta charset="UTF-8" />
 ✅ 모든 브라우저, 모든 기기에서 정확히 표시됨 
요약 UTF-8은 선택지가 아니라 필수입니다. 한글을 포함한 국제적 콘텐츠를
효율적으로 표현할 수 있으면서도, 전 세계 표준이기 때문입니다.
-->

<!--
DOCTYPE이 없으면:
브라우저 → "어? 이게 뭐지? 옛날 HTML인가?"
         → 호환성 모드(Quirks Mode) 실행
         → CSS가 다르게 보임, 레이아웃 깨짐 🔴


HTML4 시대 (복잡했음):
<!DOCTYPE html PUBLIC "-//W3C//DTD HTML 4.01//EN" "http://www.w3.org/TR/html4/strict.dtd">
HTML5 현대 (간단함):
<!doctype html>
3. 매번 선언해야 하나?

답: YES, 반드시 모든 HTML 파일 최상단에!

<!doctype html>
<html lang="ko">
  <head>...</head>
  <body>...</body>
</html>

왜냐하면:
- 각 HTML 파일은 독립적인 문서
- 브라우저는 파일을 열 때마다 "이게 뭐지?" 확인해야 함
- DOCTYPE으로 명확히 선언 → 안정적인 렌더링

4. 실제 차이 비교

<!doctype html>
<html>
  <body style="margin: 0">
    <div style="width: 100%">화면 꽉 찬 박스</div>
  </body>
</html>
  <body style="margin: 0">
    <div style="width: 100%">화면 꽉 찬 박스</div>
  </body>
</html>
요약

┌───────────┬───────────────────────────────────────────────┐
│   항목    │                         설명                          │
├───────────┼───────────────────────────────────────────────┤
│ 역할      │ 브라우저에게 "이건 최신 HTML5야"라고 알려주기 │
├───────────┼───────────────────────────────────────────────┤
│ 선언 필수 │ 🔴 YES, 모든 HTML 파일 최상단에 반드시        │
├───────────┼───────────────────────────────────────────────┤
│ 형식      │ <!doctype html> (그냥 이것만 외우면 됨)        │
├───────────┼───────────────────────────────────────────────┤
│ 안 하면   │ 호환성 모드로 돌아가 레이아웃/스타일 깨짐     │
└───────────┴───────────────────────────────────────────────┘
-->
