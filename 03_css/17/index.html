<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="styles/main.css" />
    <title>가상 요소 ::before ::after</title>
  </head>
  <body>
    <!-- 제목 앞에 ::before 로 별(★)이 붙음 -->
    <h1 class="star-title">즐겨찾기 메뉴</h1>
    <!-- ::before·::after 로 양옆에 따옴표가 생김 -->
    <p class="quote">가짜 요소는 HTML에 없다</p>
    <!-- ::after 로 글자 아래 파란 줄이 그려짐 -->
    <p class="underline-deco">밑줄 장식이 붙은 문장</p>
    <div>
      <!-- HTML엔 "필수다"라는 의미(class)만 -->
      <label class="required">이름</label>
      <input type="text" />

      <label class="required">이메일</label>
      <input type="email" />

      <label>닉네임</label>
      <!-- 선택 항목은 class 안 붙임 -->
      <input type="text" />
    </div>
  </body>
</html>
