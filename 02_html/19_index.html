<!-- html 문서선언 -->
<!doctype html>
<!-- 한국어 페이지 선언 -->
<html lang="ko">
  <!-- 화면엔 안 보이는 준비 칸 -->
  <head>
    <!-- 한글 안 깨지게 -->
    <meta charset="UTF-8" />
    <!-- 브라우저 탭에 뜨는 이름 -->
    <title>id 이름표</title>
  </head>
  <!-- 화면에 보이는 진짜 내용 칸 -->
  <body>
    <!-- id = 페이지에 딱 하나뿐인 이름표 (같은 값 두 번 X, 학번처럼) -->
    <h1 id="top">맨 위 제목</h1>
    <p id="content">본문 내용</p>
  </body>
</html>
<!-- id="top" = 이 페이지에 단 하나뿐인 이름표 — 같은 id 값을 두 번 쓰면 안 됨 (STEP 23에서 href="#top"으로 이 위치로 점프) -->
