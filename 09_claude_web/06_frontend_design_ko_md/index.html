<!doctype html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="theme-color" content="#ffffff" />
<title>계산기</title>
<link rel="stylesheet" as="style" crossorigin
  href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.css" />
<link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app">
    <header class="top-bar">
      <h1 class="top-bar__title">계산기</h1>
      <button class="icon-button" id="copyBtn" type="button" aria-label="결과 복사">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <rect x="9" y="9" width="12" height="12" rx="2"/>
          <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>
        </svg>
      </button>
    </header>

    <div class="display">
      <div class="display__expression" id="expression">&nbsp;</div>
      <div class="display__result" id="result">0</div>
    </div>

    <div class="keypad" id="keypad">
      <button class="key key--function" data-action="clear" type="button">AC</button>
      <button class="key key--function" data-action="sign" type="button">+/−</button>
      <button class="key key--function" data-action="percent" type="button">%</button>
      <button class="key key--operator" data-action="operator" data-value="÷" type="button">÷</button>

      <button class="key key--number" data-action="digit" data-value="7" type="button">7</button>
      <button class="key key--number" data-action="digit" data-value="8" type="button">8</button>
      <button class="key key--number" data-action="digit" data-value="9" type="button">9</button>
      <button class="key key--operator" data-action="operator" data-value="×" type="button">×</button>

      <button class="key key--number" data-action="digit" data-value="4" type="button">4</button>
      <button class="key key--number" data-action="digit" data-value="5" type="button">5</button>
      <button class="key key--number" data-action="digit" data-value="6" type="button">6</button>
      <button class="key key--operator" data-action="operator" data-value="−" type="button">−</button>

      <button class="key key--number" data-action="digit" data-value="1" type="button">1</button>
      <button class="key key--number" data-action="digit" data-value="2" type="button">2</button>
      <button class="key key--number" data-action="digit" data-value="3" type="button">3</button>
      <button class="key key--operator" data-action="operator" data-value="+" type="button">+</button>

      <button class="key key--number key--zero" data-action="digit" data-value="0" type="button">0</button>
      <button class="key key--number" data-action="digit" data-value="." type="button">.</button>
      <button class="key key--equals" data-action="equals" type="button">=</button>
    </div>

    <div class="toast" id="toast">복사했어요</div>
  </div>

  <script src="script.js"></script>
</body>
</html>
