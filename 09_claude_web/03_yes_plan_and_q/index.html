<!doctype html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>계산기</title>
<link rel="stylesheet" href="style.css" />
</head>
<body data-theme="dark">
  <div class="app">
    <header class="topbar">
      <h1 class="logo">계산기</h1>
      <div class="topbar-actions">
        <button id="historyToggle" class="icon-btn" aria-label="히스토리 열기">🕒</button>
        <button id="themeToggle" class="icon-btn" aria-label="테마 전환">🌙</button>
      </div>
    </header>

    <main class="main">
      <section class="calculator">
        <div class="display">
          <div class="expression" id="expression"></div>
          <div class="result" id="result">0</div>
        </div>

        <div class="sci-row" id="sciRow">
          <button class="btn func" data-key="sin">sin</button>
          <button class="btn func" data-key="cos">cos</button>
          <button class="btn func" data-key="tan">tan</button>
          <button class="btn func" data-key="(">(</button>
          <button class="btn func" data-key="log">log</button>
          <button class="btn func" data-key="ln">ln</button>
          <button class="btn func" data-key="sqrt">√</button>
          <button class="btn func" data-key=")">)</button>
          <button class="btn func" data-key="pi">π</button>
          <button class="btn func" data-key="e">e</button>
          <button class="btn func" data-key="^">x^y</button>
          <button class="btn func" data-key="%">%</button>
        </div>

        <div class="keypad">
          <button class="btn utility" data-key="AC">AC</button>
          <button class="btn utility" data-key="back">⌫</button>
          <button class="btn op" data-key="%">%</button>
          <button class="btn op" data-key="/">÷</button>

          <button class="btn" data-key="7">7</button>
          <button class="btn" data-key="8">8</button>
          <button class="btn" data-key="9">9</button>
          <button class="btn op" data-key="*">×</button>

          <button class="btn" data-key="4">4</button>
          <button class="btn" data-key="5">5</button>
          <button class="btn" data-key="6">6</button>
          <button class="btn op" data-key="-">-</button>

          <button class="btn" data-key="1">1</button>
          <button class="btn" data-key="2">2</button>
          <button class="btn" data-key="3">3</button>
          <button class="btn op" data-key="+">+</button>

          <button class="btn sci-toggle" id="sciToggle">ƒx</button>
          <button class="btn" data-key="0">0</button>
          <button class="btn" data-key="±">±</button>
          <button class="btn equals" data-key="=">=</button>
        </div>
      </section>

      <aside class="history-panel" id="historyPanel">
        <div class="history-header">
          <h2>히스토리</h2>
          <button id="clearHistory" class="text-btn">전체 삭제</button>
        </div>
        <ul class="history-list" id="historyList"></ul>
        <p class="history-empty" id="historyEmpty">계산 기록이 없습니다</p>
      </aside>
    </main>
  </div>

  <script src="script.js"></script>
</body>
</html>
