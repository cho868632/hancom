<!doctype html>
<!-- "이건 HTML 문서야" 선언 -->
<html lang="ko">
  <!-- 문서 시작, 한국어 페이지 -->
  <head>
    <!-- 화면엔 안 보이는 준비 칸 -->
    <meta charset="UTF-8" />
    <!-- 한글 안 깨지게 -->
    <title>지도 넣기</title>
    <!-- 브라우저 탭에 뜨는 이름 -->
  </head>
  <body>
    <h1>지도</h1>
    <!-- 화면에 보이는 진짜 내용 칸 -->
    <!-- iframe 한 개로 지도를 그대로 박음, src만 지도 주소로 -->
    <iframe
      src="https://www.google.com/maps/embed?pb=!1m5!3m3!1m2!1s0x357b580827406d27%3A0xdfbbe629bb9ddb09!2z7JWE67iM64m07ZSE656RIO2MkOq1kA!5e0!3m2!1sko!2skr!4v1782785097202!5m2!1sko!2skr"
      width="600"
      height="450"
      style="border: 0"
      allowfullscreen=""
      loading="lazy"
      referrerpolicy="strict-origin-when-cross-origin"
    ></iframe>
  </body>
</html>
<!-- 구글이 자동으로 붙여 주는 옵션 — 외울 필요 없이 "이런 게 있구나" 정도만
• width·height — 창 크기(가로·세로), STEP 16 영상에서 배움
• style="border:0;" — 지도 둘레 선 없애기 (style은 CSS 영역, 다음 과목 CSS에서 자세히)
• allowfullscreen — 전체화면 버튼 켜기
• loading="lazy" — 지도 로딩 미루기 (속도 ↑)
• referrerpolicy — 어디서 왔는지 정보를 얼마나 넘길지 정하는 보안 옵션 -->
