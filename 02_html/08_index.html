<!-- html 문서선언 -->
<!doctype html>
<!-- 한국어페이지선언 -->
<html lang="ko">
  <!-- 준비 -->
  <head>
    <!-- 한글 안깨지게 -->
    <meta charset="UTF-8" />
    <!-- 탭에뜨는이름 -->
    <title>이미지</title>
  </head>
  <!-- 화면에 보이는 내용 -->
  <body>
    <!-- img => 화면애 사진 넣기 닫는 태그 없는 요소라 />로 끝남 -->
    <!-- src => 사진주소 / alt => 사진이 로딩 안될때 표시할 내용 -->
    <p>저는 <strong>더미</strong>이미지 입니다.</p>
    <img src="https://picsum.photos/300/200" alt="예시 사진" />
    <p>이미지가 깨지면 이렇게 됩니다</p>
    <img src="https://picsum.phot/300/200" alt="예시 사진" />
    <p>저는 로컬 이미지 압니다.</p>
    <img src="../02_html/image.jpg" alt="로컬이미지" />
  </body>
</html>
<!-- <img>는 넣을 내용이 없어 닫는 태그도 안쓰는 빈 요소로 끝을 />로 마감
        br,hr,meta도 같음 -->
