<!-- html 문서선언 -->
<!doctype html>
<!-- 한국어 페이지 선언 -->
<html lang="ko">
  <!-- 화면엔 안 보이는 준비 칸 -->
  <head>
    <!-- 한글 안 깨지게 -->
    <meta charset="UTF-8" />
    <!-- 브라우저 탭에 뜨는 이름 -->
    <title>접는 상자</title>
  </head>
  <!-- 화면에 보이는 진짜 내용 칸 -->
  <body>
    <h1>접기</h1>
    <!-- 클릭하면 펴고 접히는 상자 -->

    <details style="cursor: pointer">
      <!-- 항상 보이는 제목(클릭 버튼) -->
      <summary>정답 보기</summary>
      <!-- 펼쳐야 보이는 내용 -->
      <p>여기는 눌러야 보여</p>
    </details>
  </body>
</html>
