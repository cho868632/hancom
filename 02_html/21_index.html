<!-- html 문서선언 -->
<!doctype html>
<!-- 한국어 페이지 선언 -->
<html lang="ko">
  <!-- 화면엔 안 보이는 준비 칸 -->
  <head>
    <!-- 한글 안 깨지게 -->
    <meta charset="UTF-8" />
    <!-- 브라우저 탭에 뜨는 이름 -->
    <title>span 상자</title>
    <!-- span을 확인하기 위한 스타일 코드 -->
    <style>
      .ingredient {
        color: red;
        font-weight: bold;
        background-color: yellow;
      }
    </style>
  </head>
  <!-- 화면에 보이는 진짜 내용 칸 -->
  <body>
    <!-- span = 글자 사이 일부만 따로 묶는 인라인 상자 (줄 안 바꿈) -->
    <p>글자 중 <span class="ingredient">여기만</span> 강조</p>
  </body>
</html>
<!-- <span>여기만</span> = 문장 속 글자 일부만 따로 묶는 인라인 상자 — 줄을 바꾸지 않고 글자 사이에 끼어듦
<div>가 한 줄 통째 상자라면, <span>은 글자 몇 개만 감싸는 작은 상자 (화면 모양은 그대로 — 나중에 그 부분만 콕 집어 꾸미려고 미리 묶어두는 것)

div·span은 언제? (시맨틱 먼저)

<header>·<main>·<footer> 같은 시맨틱 상자는 이름만 봐도 "여긴 머리말·본문·꼬리말"이라고 뜻이 드러남 (STEP 10) — 반대로 <div>·<span>는 뜻이 없는 그냥 빈 상자

택배 상자에 비유 — 겉에 "주방용품"이라 적힌 상자(시맨틱)가 라벨 없는 민무늬 상자(div)보다 나중에 찾기 쉬움 — 사람도, 검색엔진·화면낭독기도 구조를 바로 알아봄

고르는 순서
① 뜻에 맞는 시맨틱 상자가 있나? (header·main·footer — STEP 10) → 있으면 그걸
② 마땅한 게 없고 그냥 묶기만 하면 됨 → 한 줄 통째면 <div>, 글자 일부면 <span> -->
