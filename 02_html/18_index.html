<!-- html 문서선언 -->
<!doctype html>
<!-- 한국어 페이지 선언 -->
<html lang="ko">
  <!-- 화면엔 안 보이는 준비 칸 -->
  <head>
    <!-- 한글 안 깨지게 -->
    <meta charset="UTF-8" />
    <!-- 브라우저 탭에 뜨는 이름 -->
    <title>class 이름표</title>
  </head>
  <!-- 화면에 보이는 진짜 내용 칸 -->
  <body>
    <!-- class = 여러 요소가 함께 쓰는 이름표 (같은 값 여러 번 OK) -->
    <p class="note1">첫째 줄</p>
    <p class="note1">둘째 줄</p>
    <p class="note2">셋째 줄</p>
    <p class="note2">넷째 줄</p>
    <p class="note3">다섯째 줄</p>
  </body>
</html>
<!-- 태그에 이름표를 달아 두면 나중에 CSS·JavaScript가 그 요소를 콕 집어 꾸미거나 움직임 — 다음 단계 CSS로 가는 다리
class = 여러 개가 같이 쓰는 이름표(반 이름표처럼) — 같은 값을 여러 번 달아도 됨 -->
<!-- class="note" = 두 문단에 같은 이름표를 단 것 — 나중에 CSS로 note 하나만 꾸미면 둘 다 같이 바뀜 -->
